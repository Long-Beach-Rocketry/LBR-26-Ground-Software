name: CI/CD

on:
  push:
    branches:
      - main
      - lf-*
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Update package cache with retries
        run: |
          for attempt in {1..3}; do
            echo "Attempt $attempt to update apt cache..."
            if sudo apt-get update -o Apt::Select::By-Hash=no; then
              echo "apt-get update succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Retrying after 5s..."
              sleep 5
            else
              echo "apt-get update failed after 3 attempts"
              exit 1
            fi
          done
      
      - name: Pre-install ninja-build
        run: sudo apt-get install -y ninja-build

  tests:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset linux-ninja-release

      - name: Build
        run: cmake --build --preset linux-ninja-release --target lbr_tests lbr_ground

      - name: Run tests
        run: ctest --preset linux-ninja-release

  clang:
    name: Clang Checks
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update package cache with retries
        run: |
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            if sudo apt-get update -o Apt::Select::By-Hash=no; then
              echo "apt-get update succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              sleep 5
            else
              exit 1
            fi
          done

      - name: Install clang tools
        run: sudo apt-get install -y ninja-build clang-format clang-tidy

      - name: Configure for clang checks
        run: cmake --preset linux-ninja-release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang sanity checks
        run: cmake --build --preset linux-ninja-release --target sanity-check

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update package cache with retries
        run: |
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            if sudo apt-get update -o Apt::Select::By-Hash=no; then
              echo "apt-get update succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              sleep 5
            else
              exit 1
            fi
          done

      - name: Install docs tools
        run: sudo apt-get install -y ninja-build doxygen graphviz

      - name: Configure for docs
        run: cmake --preset linux-ninja-release

      - name: Build docs
        run: cmake --build --preset linux-ninja-release --target docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build-linux/docs/doxygen/html

  gui:
    name: GUI Tests and Package
    runs-on: windows-latest

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GUI Python deps
        shell: powershell
        run: python -m pip install -r gui/requirements-dev.txt

      - name: Run GUI tests
        shell: powershell
        run: python -m pytest gui/tests

      - name: Build GUI onefile binary
        shell: powershell
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name lbr-ground-gui `
            --paths gui `
            gui/main.py

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update package cache with retries
        run: |
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            if sudo apt-get update -o Apt::Select::By-Hash=no; then
              echo "apt-get update succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              sleep 5
            else
              exit 1
            fi
          done

      - name: Install build tools
        run: sudo apt-get install -y ninja-build

      - name: Install gcovr
        run: python3 -m pip install --upgrade gcovr

      - name: Configure (coverage)
        run: cmake --preset linux-ninja-coverage

      - name: Build (coverage)
        run: cmake --build --preset linux-ninja-coverage --target lbr_tests lbr_ground

      - name: Run tests (coverage)
        run: ctest --preset linux-ninja-coverage

      - name: Generate coverage reports
        run: |
          gcovr -r . \
            --filter '^.*/src/' \
            --exclude '^.*/build.*/_deps/' \
            --xml-pretty -o build-linux-coverage/coverage.xml \
            --html-details -o build-linux-coverage/coverage.html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build-linux-coverage/coverage.xml
            build-linux-coverage/coverage.html

  feature-options:
    name: Feature Options (ZeroMQ + Protobuf)
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update package cache with retries
        run: |
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            if sudo apt-get update -o Apt::Select::By-Hash=no; then
              echo "apt-get update succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              sleep 5
            else
              exit 1
            fi
          done

      - name: Install build tools and optional deps
        run: sudo apt-get install -y ninja-build libzmq3-dev protobuf-compiler python3-pip

      - name: Install nanopb
        run: |
          python3 -m pip install --user nanopb
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure with optional features
        run: cmake --preset linux-ninja-feature-options

      - name: Build tests with optional features
        run: cmake --build --preset linux-ninja-feature-options --target lbr_tests

      - name: Generate protobuf code
        run: cmake --build --preset linux-ninja-feature-options --target connector_proto_codegen

      - name: Generate nanopb code
        run: cmake --build --preset linux-ninja-feature-options --target connector_nanopb_codegen

      - name: Run ZeroMQ connector test
        run: ctest --preset linux-ninja-feature-options -R ConnectorTests.LocalZmqTransportPubSubExchange

  windows-smoke:
    name: Windows UCRT Smoke
    runs-on: windows-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-cmake

      - name: Configure
        shell: powershell
        run: cmake --preset windows-ucrt-ninja

      - name: Build
        shell: powershell
        run: cmake --build --preset windows-ucrt-ninja --target lbr_tests lbr_ground

      - name: Test
        shell: powershell
        run: ctest --preset windows-ucrt-ninja
