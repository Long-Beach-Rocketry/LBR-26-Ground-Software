name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build Linux Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake -S . -B build-release-linux -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build binaries
        run: cmake --build build-release-linux --target lbr_ground lbr_hil_runner

      - name: Package Linux artifacts
        run: |
          mkdir -p release/linux
          cp build-release-linux/LoRa/lbr_ground release/linux/
          cp build-release-linux/LoRa/lbr_hil_runner release/linux/
          tar -czf lbr-linux-x64.tar.gz -C release/linux .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: lbr-linux-x64
          path: lbr-linux-x64.tar.gz

  build-windows:
    name: Build Windows Artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-cmake

      - name: Configure
        shell: powershell
        run: cmake --fresh --preset windows-ucrt-ninja

      - name: Build binaries
        shell: powershell
        run: cmake --build --preset windows-ucrt-ninja --target lbr_ground lbr_hil_runner

      - name: Package Windows artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release/windows | Out-Null
          Copy-Item build/LoRa/lbr_ground.exe release/windows/
          Copy-Item build/LoRa/lbr_hil_runner.exe release/windows/
          Compress-Archive -Path release/windows/* -DestinationPath lbr-windows-ucrt64-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: lbr-windows-ucrt64-x64
          path: lbr-windows-ucrt64-x64.zip

  build-docs:
    name: Build Documentation Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install docs tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build doxygen graphviz

      - name: Configure
        run: cmake -S . -B build-release-docs -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build docs
        run: cmake --build build-release-docs --target docs

      - name: Package docs
        run: tar -czf lbr-docs-html.tar.gz -C build-release-docs/docs/doxygen html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: lbr-docs-html
          path: lbr-docs-html.tar.gz

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-docs

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-artifacts/lbr-linux-x64/lbr-linux-x64.tar.gz
            release-artifacts/lbr-windows-ucrt64-x64/lbr-windows-ucrt64-x64.zip
            release-artifacts/lbr-docs-html/lbr-docs-html.tar.gz